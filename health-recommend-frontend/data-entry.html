<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数据录入 - 阳光减肥 · 健康生活</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 阳光风格全局样式（与 dashboard 保持一致） */
        body {
            background: url('https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover fixed no-repeat;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding-top: 80px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(255,235,200,0.5) 0%, rgba(255,215,150,0.3) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .navbar {
            background: rgba(255,248,235,0.85) !important;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,215,150,0.6);
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            color: #f15f2b !important;
        }
        .navbar-brand i {
            color: #ffa500;
        }
        .nav-link {
            color: #4a3a28 !important;
            font-weight: 500;
            margin: 0 6px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: #f15f2b;
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(241,95,43,0.3);
        }
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255,248,235,0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(255,215,150,0.7);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .nav-tabs .nav-link {
            border: none;
            border-radius: 30px;
            color: #5a4a2e;
            padding: 0.5rem 1.5rem;
            margin-right: 5px;
        }
        .nav-tabs .nav-link.active {
            background: #f15f2b;
            color: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f15f2b, #ffb347);
            border: none;
            border-radius: 40px;
            padding: 10px 25px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(241,95,43,0.3);
        }
        .form-control, .form-select {
            border-radius: 30px;
            border: 1px solid #ffd9a8;
            background: rgba(255,255,240,0.9);
        }
        .form-control:focus, .form-select:focus {
            border-color: #f15f2b;
            box-shadow: 0 0 0 3px rgba(241,95,43,0.2);
        }
        .btn-outline-primary {
            border-color: #f15f2b;
            color: #f15f2b;
        }
        .btn-outline-primary:hover {
            background: #f15f2b;
            color: white;
        }
        .helper-select {
            margin-bottom: 1rem;
            border-bottom: 1px dashed #ffd9a8;
            padding-bottom: 1rem;
        }
        .helper-select label {
            font-size: 0.9rem;
            color: #b87b44;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-sun me-2"></i>阳光减重</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="data-entry.html"><i class="fas fa-edit"></i>数据录入</a></li>
                    <li class="nav-item"><a class="nav-link" href="recommendations.html"><i class="fas fa-lightbulb"></i>推荐</a></li>
                    <li class="nav-item"><a class="nav-link" href="archive.html"><i class="fas fa-archive"></i>健康档案</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>登出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h3 class="mb-4" style="color:#d45e1e;"><i class="fas fa-pen me-2"></i>数据录入</h3>
        <ul class="nav nav-tabs" id="dataTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#body"><i class="fas fa-weight-scale"></i> 身体指标</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#diet"><i class="fas fa-utensils"></i> 饮食记录</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#exercise"><i class="fas fa-dumbbell"></i> 运动记录</button></li>
        </ul>
        <div class="tab-content mt-3">
            <!-- 身体指标（简化版） -->
            <div class="tab-pane fade show active" id="body">
                <div class="card">
                    <div class="card-body">
                        <form id="bodyForm">
                            <div class="mb-3"><label>体重 (kg)</label><input type="number" step="0.1" class="form-control" name="weight" required></div>
                            <div class="mb-3"><label>身高 (cm)</label><input type="number" step="0.1" class="form-control" name="height" required></div>
                            <div class="mb-3"><label>年龄 (岁)</label><input type="number" class="form-control" name="age" required></div>
                            <div class="mb-3"><label>性别</label><select class="form-select" name="gender"><option value="女">女</option><option value="男">男</option></select></div>
                            <div class="mb-3"><label>记录日期</label><input type="date" class="form-control" name="record_date" required></div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 饮食记录（含自动估算） -->
            <div class="tab-pane fade" id="diet">
                <div class="card">
                    <div class="card-body">
                        <form id="dietForm">
                            <div class="mb-3">
                                <label>食物名称</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" name="food_name" id="foodNameInput" placeholder="输入食物名称" required>
                                    <button type="button" class="btn btn-outline-primary" id="estimateFoodBtn">
                                        <i class="fas fa-magic"></i> 自动估算热量
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3"><label>热量 (千卡)</label><input type="number" class="form-control" name="calories" id="caloriesInput" required placeholder="点击自动估算或手动输入"></div>
                            <div class="mb-3"><label>餐别</label><select class="form-select" name="meal_type"><option>早餐</option><option>午餐</option><option>晚餐</option><option>加餐</option></select></div>
                            <div class="mb-3"><label>记录日期</label><input type="date" class="form-control" name="record_date" required></div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 运动记录（含自动估算） -->
            <div class="tab-pane fade" id="exercise">
                <div class="card">
                    <div class="card-body">
                        <form id="exerciseForm">
                            <div class="mb-3">
                                <label>运动类型</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" name="exercise_type" id="exerciseTypeInput" placeholder="输入运动类型" required>
                                    <button type="button" class="btn btn-outline-primary" id="estimateExerciseBtn">
                                        <i class="fas fa-magic"></i> 自动估算消耗
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3"><label>时长 (分钟)</label><input type="number" class="form-control" name="duration" id="durationInput" required></div>
                            <div class="mb-3"><label>消耗热量 (千卡)</label><input type="number" class="form-control" name="calories_burned" id="caloriesBurnedInput" placeholder="点击自动估算或手动输入"></div>
                            <div class="mb-3"><label>记录日期</label><input type="date" class="form-control" name="record_date" required></div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="js/data-entry.js"></script>
</body>
</html>
