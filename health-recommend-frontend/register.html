<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注册 - 阳光减肥 · 健康生活</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: url('https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover fixed no-repeat;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(255,235,200,0.5) 0%, rgba(255,215,150,0.3) 100%);
            pointer-events: none;
        }
        .glass-card {
            background: rgba(255,248,235,0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255,215,150,0.7);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
            z-index: 10;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 25px 45px rgba(0,0,0,0.15); }
        .logo-area { text-align:center; margin-bottom: 35px; }
        .logo-icon {
            width: 85px; height: 85px;
            background: linear-gradient(135deg, #f15f2b, #ffa500);
            border-radius: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(241,95,43,0.3);
        }
        .logo-icon i { font-size: 42px; color: white; }
        .logo-area h1 { font-size: 2rem; font-weight: 700; color: #d45e1e; margin-bottom: 8px; }
        .logo-area p { color: #7d6b4e; font-size: 0.9rem; }
        .input-group-custom {
            margin-bottom: 25px;
            position: relative;
        }
        .input-group-custom .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #b87b44;
            font-size: 18px;
            z-index: 2;
        }
        .input-group-custom input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(255,255,240,0.9);
            border: 1px solid rgba(255,215,150,0.8);
            border-radius: 40px;
            color: #3a2c1c;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group-custom input:focus {
            outline: none;
            border-color: #f15f2b;
            box-shadow: 0 0 0 3px rgba(241,95,43,0.2);
            background: #fffef7;
        }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f15f2b, #ffb347);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(241,95,43,0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #7d6b4e;
        }
        .login-link a { color: #f15f2b; text-decoration: none; font-weight: 600; }
        .login-link a:hover { color: #ffa500; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <h1>创建账号</h1>
            <p>填写信息快速注册</p>
        </div>
        <form id="registerForm">
            <div class="input-group-custom">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" placeholder="用户名" required>
            </div>
            <div class="input-group-custom">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" placeholder="密码" required>
            </div>
            <div class="input-group-custom">
                <i class="fas fa-check-circle input-icon"></i>
                <input type="password" id="confirmPassword" placeholder="确认密码" required>
            </div>
            <button type="submit" class="register-btn"><i class="fas fa-user-plus me-2"></i>注册</button>
        </form>
        <div class="login-link">
            已有账号？ <a href="index.html">去登录 <i class="fas fa-arrow-right ms-1"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module">
        import apiClient from './js/api.js';
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) { alert('两次密码不一致'); return; }
            const btn = document.querySelector('.register-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i>注册中...';
            btn.disabled = true;
            try {
                await apiClient.post('/register', { username, password });
                btn.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
                btn.innerHTML = '<i class="fas fa-check me-2"></i>注册成功！';
                setTimeout(() => window.location.href = 'index.html', 500);
            } catch (error) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('注册失败：' + (error.response?.data?.detail || '用户名已存在或网络错误'));
            }
        });
    </script>
</body>
</html>
