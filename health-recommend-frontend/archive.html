    <style>
        /* 阳光版样式（与之前相同，此处省略） */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: url('https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover fixed no-repeat;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding-top: 80px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(255,235,200,0.5) 0%, rgba(255,215,150,0.3) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .navbar {
            background: rgba(255,248,235,0.85) !important;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,215,150,0.6);
        }
        .navbar-brand { font-weight: 800; font-size: 1.6rem; color: #f15f2b !important; }
        .navbar-brand i { color: #ffa500; }
        .nav-link { color: #4a3a28 !important; font-weight: 500; margin: 0 6px; border-radius: 30px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: #f15f2b; color: white !important; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(241,95,43,0.3); }
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .nav-pills .nav-link {
            border-radius: 30px;
            color: #5a4a2e;
            background: rgba(255,248,235,0.7);
            margin-right: 10px;
        }
        .nav-pills .nav-link.active {
            background: #f15f2b;
            color: white;
        }
        .list-group-item {
            background: rgba(255,248,235,0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,150,0.7);
            border-radius: 20px !important;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .list-group-item:hover {
            transform: translateX(5px);
            background: rgba(255,248,235,0.95);
        }
    </style>
</head>
